aid: autogen-studio
name: AutoGen Studio
description: >-
  AutoGen Studio is a low-code / no-code developer GUI from Microsoft Research
  for rapidly prototyping, composing, and debugging multi-agent AI workflows
  built on the AutoGen framework. Shipped as the `autogenstudio` Python package
  and launched with `autogenstudio ui`, it serves a FastAPI + React (Gatsby) web
  app on localhost that exposes four primary interfaces — Team Builder,
  Playground, Gallery, and Deployment — backed by a SQLModel persistence layer
  (SQLite by default; any SQLAlchemy-compatible backend such as PostgreSQL,
  MySQL, MSSQL via `--database-uri`). The Team Builder offers drag-and-drop and
  JSON authoring of teams, agents, models, tools, and termination conditions
  fully aligned with AutoGen AgentChat's declarative component spec; the
  Playground streams live inter-agent messages and renders the control
  transition graph; the Gallery imports community components; and the
  Deployment view exports a team to Python, exposes it as an endpoint, and
  packages it for Docker. AutoGen Studio is built on AutoGen AgentChat / Core
  / Extensions and supports any OpenAI-compatible model endpoint (OpenAI,
  Azure OpenAI, Anthropic, local vLLM/Ollama, etc.) via declarative
  `model_client` configuration, plus MCP tool integration. Authentication is
  experimental (GitHub OAuth + JWT only). Microsoft explicitly positions
  AutoGen Studio as a research prototype — not production-ready — and
  encourages teams that need authn/z, multi-tenancy, sandboxing rigor, or
  hardened deployment to build directly on the AutoGen framework instead.
  Companion to the broader AutoGen multi-agent framework, distributed under
  the Microsoft microsoft/autogen monorepo (CC-BY-4.0 docs, MIT code).
