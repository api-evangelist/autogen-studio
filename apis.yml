  - type: Features
    data:
      - Installable via `pip install -U autogenstudio` (Python 3.10+); current PyPI release 0.4.2.2
      - Launched as a local web app with `autogenstudio ui --port 8081` (FastAPI backend + Gatsby/React frontend)
      - Configurable via `--host`, `--port`, `--appdir`, `--reload`, `--database-uri`, `--upgrade-database`, `--auth-config`
      - Team Builder visual canvas with drag-and-drop assembly of teams, agents, models, tools, and termination
        conditions, plus equivalent direct JSON editing
      - Component Library backed by AutoGen AgentChat's declarative component spec (teams, agents, models, tools,
        termination conditions)
      - Playground with live inter-agent message streaming, control transition graph visualization, UserProxyAgent
        sessions, and pause/stop run control
      - Gallery for discovering and importing community-created components and third-party integrations
      - Deployment view that exports a team to Python code, exposes it as a runnable endpoint, and supports
        containerized execution via Docker
      - Bring-your-own model — any OpenAI-compatible endpoint (OpenAI, Azure OpenAI, Anthropic, vLLM, Ollama,
        local models) via declarative `model_client` config; AutoGen Extensions provides first-party clients
      - Define agents in Python with AutoGen AgentChat, dump to JSON via `dump_component().model_dump_json()`,
        and import into Studio's JSON editor
      - MCP (Model Context Protocol) tool integration via `autogenstudio/mcp` and `/api/mcp` routes
      - SQLModel-based persistence (Pydantic + SQLAlchemy) — defaults to SQLite, supports PostgreSQL, MySQL,
        MSSQL, Oracle, and other SQLAlchemy dialects
      - Internal FastAPI surface (not a public API) under `/api/` with routes for teams, sessions, runs, gallery,
        mcp, settings, validation, and a `/api/ws` WebSocket for streaming
      - Experimental GitHub OAuth authentication with JWT (`--auth-config auth.yaml`); disabled by default,
        WebSockets require `?token=` query param when enabled
      - Default app directory `~/.autogenstudio/` for database and generated user files
      - Dev container shipped under `python/packages/autogen-studio/.devcontainer/` for source builds
      - Frontend stack: React + Gatsby (built with `yarn build`); backend served by `autogenstudio.web.serve`
      - Explicitly positioned by Microsoft as a research prototype — not production-ready; lacks production-grade
        authn/z, multi-tenancy, jailbreak hardening, and least-privilege key scoping
      - Companion to the broader AutoGen framework (AgentChat, Core, Extensions, .NET) under the
        microsoft/autogen monorepo (~58k GitHub stars)
      - Original research prototype (Oct 2023) by Dibia, Bansal, Fourney, Choudhury, Amershi, Awadallah, Wang;
        EMNLP 2024 System Demonstrations paper
      - License: MIT for code, CC-BY-4.0 for documentation
